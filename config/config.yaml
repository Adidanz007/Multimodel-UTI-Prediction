project:
  seed: 42
  mlflow_experiment: "multimodal_uti_phase1"

paths:
  clinical_raw: "data/raw/clinical_dataset.csv"
  clinical_cleaned: "data/processed/clinical_cleaned.csv"
  ultrasound_raw_dir: "data/raw/ultrasound_images"
  ultrasound_split_dir: "data/processed/ultrasound_split"
  models_dir: "models"
  results_metrics_dir: "results/metrics"
  results_graphs_dir: "results/graphs"

clinical:
  target_col: "uti_label"
  drop_columns: []
  test_size: 0.2
  cv_folds: 5
  feature_selection_top_k: 25
  randomized_search_iter: 20
  scoring: "roc_auc"
  model_output: "models/clinical_model.pkl"

ultrasound:
  image_size: [224, 224]
  batch_size: 32
  epochs: 30
  learning_rate: 0.0001
  val_size: 0.15
  test_size: 0.15
  backbone: "EfficientNetB0"
  fine_tune_at: 100
  class_weight_normal: 1.0
  class_weight_abnormal: 2.5
  early_stopping_patience: 6
  lr_plateau_patience: 3
  model_output: "models/ultrasound_model.h5"

augmentation:
  rotation_limit: 20
  width_shift_limit: 0.1
  height_shift_limit: 0.1
  zoom_limit: 0.2
  horizontal_flip: true
  brightness_min: 0.8
  brightness_max: 1.2

fusion:
  weighted_clinical: 0.6
  weighted_ultrasound: 0.4
  model_output: "models/multimodal_model.pkl"

explainability:
  shap_sample_size: 500
  gradcam_examples: 8
